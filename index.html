<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Disco - Lanzamiento Álbum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Roboto Mono', monospace;
            overflow-x: hidden;
        }

        .death-font {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .neon-text-purple {
            text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe;
        }

        .neon-text-yellow {
            text-shadow: 0 0 5px #d4ff00, 0 0 10px #d4ff00;
            color: #d4ff00;
        }

        .main-container {
            position: relative;
            background: rgba(0, 0, 0, 0.65);
            background-image: url('https://i.imgur.com/t3UXqol.jpeg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            aspect-ratio: 9 / 16;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(188, 19, 254, 0.25);
            overflow: hidden;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(188, 19, 254, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 6s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .platform-card {
            background: rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 82px;
            height: 66px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .platform-card:hover {
            background: rgba(188, 19, 254, 0.25);
            border-color: #bc13fe;
            transform: scale(1.02);
        }



        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Capa de viñeta para mejorar contraste -->
    <div class="fixed top-0 left-0 w-full h-full bg-[radial-gradient(circle,transparent_20%,black_120%)] opacity-70 pointer-events-none"></div>

    <div class="main-container rounded-3xl pt-8 px-4 md:pt-12 md:px-6 relative z-20 shadow-[0_0_60px_rgba(0,0,0,0.9)]" style="width: auto; height: auto;">
        <div class="scanline"></div>
        


        <!-- Plataformas de Streaming -->
        <div class="flex flex-col items-center -mt-4">
            <h3 class="text-center text-[9px] text-gray-500 uppercase tracking-[0.4em] mb-6">Disponible en streaming</h3>
            <!-- espacio en blanco entre texto y botones -->
            <div class="h-80"></div>
            <div class="h-20"></div>
            <div class="flex space-x-4 -mt-2">
            
            <a href="https://open.spotify.com/intl-es/album/2VBhdnTrBNzZQghgxQYJwb" target="_blank" rel="noopener noreferrer" class="platform-card flex items-center justify-center p-3 rounded-2xl group">
                <div class="w-10 h-10 flex items-center justify-center bg-[#1DB954] rounded-full shadow-lg group-hover:shadow-[#1DB954]/50 transition-shadow">
                    <svg class="w-6 h-6 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.494 17.306c-.215.353-.674.464-1.027.249-2.85-1.741-6.436-2.134-10.658-1.171-.404.093-.81-.164-.902-.568-.093-.404.164-.81.568-.902 4.622-1.056 8.583-.611 11.77 1.336.353.215.464.674.249 1.027zm1.468-3.259c-.271.44-.847.581-1.287.31-3.262-2.004-8.234-2.585-12.091-1.413-.497.151-1.022-.132-1.173-.63-.151-.497.132-1.022.63-1.173 4.406-1.337 9.893-.685 13.612 1.599.44.271.581.847.31 1.287zm.129-3.382c-3.914-2.324-10.37-2.538-14.129-1.397-.6.182-1.235-.164-1.417-.764-.182-.6.164-1.235.764-1.417 4.316-1.31 11.439-1.056 15.918 1.603.54.32.716 1.014.396 1.554-.32.541-1.014.717-1.554.396l.222.025z"/></svg>
                </div>
            </a>

            <a href="https://music.apple.com/us/album/deaht-disco/1877908450" target="_blank" rel="noopener noreferrer" class="platform-card flex items-center justify-center p-3 rounded-2xl group">
                <div class="w-10 h-10 flex items-center justify-center bg-gradient-to-tr from-pink-500 to-red-500 rounded-full shadow-lg group-hover:shadow-pink-500/50 transition-shadow">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12.553 4.102c.491.071.865.485.865.98v10.15c0 2.227-1.48 4.298-3.766 4.712-2.731.493-5.152-1.614-5.152-4.241 0-2.146 1.74-3.886 3.887-3.886.634 0 1.23.153 1.755.421v-7.38c0-.494.373-.908.864-.98l1.547-.223-.001-.754h-.001zM14.653 4.102c.49.071.864.485.864.98v3.401c0 .494-.374.908-.864.98l-1.547.223v-1.959l1.547-.223z"/></svg>
                </div>
            </a>

            <a href="https://music.youtube.com/playlist?list=OLAK5uy_lW3NWcfYK76imMcVTrLSa7UDH7hJ3s8gA&si=fyjiufnEwTXBV8NI" target="_blank" rel="noopener noreferrer" class="platform-card flex items-center justify-center p-3 rounded-2xl group">
                <div class="w-10 h-10 flex items-center justify-center bg-red-600 rounded-full shadow-lg group-hover:shadow-red-600/50 transition-shadow">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm0 2c5.523 0 10 4.477 10 10s-4.477 10-10 10-10-4.477-10-10 4.477-10 10-10zm0 2.5a7.5 7.5 0 1 0 0 15 7.5 7.5 0 0 0 0-15zm-2 10.5v-6l5 3-5 3z"/></svg>
                </div>
            </a>
        </div>

        <!-- Footer -->
        <footer class="mt-10 text-center">
            <div class="text-[8px] text-gray-500 uppercase tracking-[0.5em]">Death Disco Official Release</div>
        </footer>
    </div>

    <script>
        document.querySelectorAll('.platform-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const href = card.getAttribute('href');
                if (href) {
                    window.open(href, '_blank', 'noopener,noreferrer');
                }
            });
        });
    </script>
</body>
</html>
